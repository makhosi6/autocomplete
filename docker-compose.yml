services:
  # Redis - words/autocomplete database
  redis_words:
    image: redis/redis-stack-server
    ports:
      - "${REDIS_WORDS_PORT:-6379}:6379"
    volumes:
      - redis_words_data:/data
    environment:
      - REDIS_ARGS=--bind 0.0.0.0 --appendonly yes --requirepass ${REDIS_PASSWORD:-xy5rgQdRgu7NTtK}
    restart: unless-stopped
    env_file: .env
    networks:
      - app-network

  # Redis - rate limiting / auth
  redis_auth:
    image: redis/redis-stack-server
    ports:
      - "${REDIS_AUTH_PORT_EXTERNAL:-6380}:6379"
    volumes:
      - redis_auth_data:/data
    environment:
      - REDIS_ARGS=--bind 0.0.0.0 --appendonly yes --requirepass ${REDIS_PASSWORD:-xy5rgQdRgu7NTtK}
    restart: unless-stopped
    env_file: .env
    networks:
      - app-network

  # Node service/app (connects to redis_words + redis_auth)
  web1:
    build: ./
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      - node_server_data:/data
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis_words}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_AUTH_HOST=${REDIS_AUTH_HOST:-redis_auth}
      - REDIS_AUTH_PORT=${REDIS_AUTH_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - PORT=${PORT:-3001}
      - NODE_ENV=${NODE_ENV:-production}
    depends_on:
      - redis_words
      - redis_auth
    networks:
      - app-network

  # Reverse proxy / load balancer
  nginx:
    build: ./nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    depends_on:
      - web1
    restart: unless-stopped
    volumes:
      - nginx_data:/data
    networks:
      - app-network

  # Data loader - run once after containers are up (replaces local.task.js)
  # Usage: docker compose up -d && docker compose run --rm data_loader
  data_loader:
    build: ./
    env_file: .env
    environment:
      - ADMIN_KEY=${ADMIN_KEY:-A8E6YziXl3RmoYAq1LjIH8f8LZtEbrDDsOEqAs8i}
    depends_on:
      - web1
    restart: "no"
    command: ["sh", "-c", "apk add --no-cache curl bash && bash ./scripts/load-data.sh http://web1:3001"]
    networks:
      - app-network

  # Redis Insight - GUI for Redis (add connections: redis_words:6379, redis_auth:6379)
  redis_insight:
    image: redis/redisinsight:latest
    ports:
      - "${REDIS_INSIGHT_PORT:-5540}:5540"
    volumes:
      - redis_insight_data:/data
    restart: unless-stopped
    env_file: .env
    environment:
      - RI_APP_PORT=5540
      - RI_APP_HOST=0.0.0.0
    depends_on:
      - redis_words
      - redis_auth
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  redis_words_data:
  redis_auth_data:
  node_server_data:
  nginx_data:
  redis_insight_data:
